name: Deploy Vite site to GitHub Pages

# Run this workflow every time you push to the main branch
on:
  push:
    branches: ['main'] # Change this to 'master' if your default branch is master

# Grant the Action permission to read your code and push to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent multiple deployments from running at the exact same time
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Job 1: Build your Vite project
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # You can change this to your preferred Node version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # Use 'npm install' if you don't have a package-lock.json committed

      - name: Build project
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload production-ready artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite outputs the build to the 'dist' folder by default

  # Job 2: Deploy the built code
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
